<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radio Link Line-of-Sight Tool</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ["Manrope", "system-ui", "sans-serif"] },
      colors: { brand: { 50: "#eff6ff", 100: "#dbeafe", 200: "#bfdbfe", 300: "#93c5fd", 500: "#3b82f6", 600: "#2563eb", 700: "#1d4ed8" } }
    }
  }
};
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: "Manrope", system-ui, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
  .hide-number-spin::-webkit-outer-spin-button,
  .hide-number-spin::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .hide-number-spin { -moz-appearance: textfield; }
  .radio-link-slider { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 999px; background: #e2e8f0; outline: none; }
  .radio-link-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #2563eb; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
  .radio-link-slider::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: #2563eb; cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
  .map-container { border-radius: 2rem; overflow: hidden; border: 1px solid #e2e8f0; background: #f1f5f9; position: relative; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="app" class="max-w-6xl mx-auto p-4 sm:p-8 bg-white min-h-screen space-y-6">

  <header class="border-b border-slate-200 pb-4">
    <h1 class="text-3xl font-extrabold tracking-tight text-slate-950">Radio Link</h1>
    <p class="text-sm text-slate-500 mt-1">Line-of-sight analysis with terrain profile, Fresnel zones, and propagation calculations.</p>
  </header>

  <!-- MAP -->
  <section>
    <div class="mb-4 flex items-end justify-between border-b border-slate-200 pb-2">
      <h2 class="text-2xl font-extrabold tracking-tight text-slate-950">Map</h2>
      <span class="text-xs text-slate-500">Click to place points, drag to move</span>
    </div>
    <div class="map-container" style="height: 420px;">
      <div id="map" style="height: 100%; width: 100%;"></div>
      <div id="map-hint" class="absolute right-4 top-4 z-[1000] max-w-[calc(100%-5.5rem)] rounded-full border border-slate-200 bg-white/95 px-3 py-1.5 text-center text-xs font-semibold text-slate-700 shadow-sm">
        Next click sets point A
      </div>
      <div class="absolute bottom-0 right-0 z-[1000] bg-white/90 px-1.5 py-0.5 text-[11px] leading-none text-slate-700">
        <a href="https://leafletjs.com" target="_blank" rel="noreferrer" class="text-blue-600 underline">Leaflet</a> | &copy; Kartverket
      </div>
    </div>
  </section>

  <!-- LOCATIONS (generated by JS) -->
  <section>
    <div class="mb-4 border-b border-slate-200 pb-2">
      <h2 class="text-2xl font-extrabold tracking-tight text-slate-950">Locations</h2>
    </div>
    <div id="locationsGrid" class="grid gap-6 xl:grid-cols-2"></div>
  </section>

  <!-- RADIO PARAMETERS -->
  <section>
    <div class="mb-4 border-b border-slate-200 pb-2">
      <h2 class="text-2xl font-extrabold tracking-tight text-slate-950">Radio Parameters</h2>
    </div>
    <div class="space-y-4">
      <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-5 xl:items-start">
        <label class="block space-y-2">
          <span class="text-base font-bold text-slate-950">Frequency</span>
          <div class="relative">
            <input id="frequencyMHz" type="text" inputmode="decimal" value="450" class="hide-number-spin h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 pr-20 text-sm font-medium text-slate-950 outline-none transition focus:border-sky-300 focus:bg-sky-50/30" />
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-sm font-semibold text-slate-950">MHz</span>
          </div>
        </label>
        <label class="block space-y-2">
          <span class="text-base font-bold text-slate-950">Fresnel</span>
          <div class="flex h-12 items-center gap-3">
            <input id="fresnelFactor" type="range" min="0.6" max="3" step="0.1" value="0.6" class="radio-link-slider min-w-0 flex-1" />
            <div id="fresnelDisplay" class="inline-flex min-w-[3.75rem] justify-center rounded-full border border-slate-200 bg-white px-3 py-1 text-sm font-semibold text-slate-950 tabular-nums">0.6</div>
          </div>
        </label>
        <label class="block space-y-2">
          <span class="text-base font-bold text-slate-950">K-factor</span>
          <select id="kFactor" class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-950 outline-none transition focus:border-sky-300 focus:bg-sky-50/30">
            <option value="4/3" selected>4/3</option>
            <option value="1">1</option>
            <option value="2/3">2/3</option>
            <option value="-2/3">-2/3</option>
          </select>
        </label>
        <label class="block space-y-2">
          <span class="text-base font-bold text-slate-950">Polarization</span>
          <select id="polarization" class="h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-950 outline-none transition focus:border-sky-300 focus:bg-sky-50/30">
            <option value="horizontal" selected>Horizontal</option>
            <option value="vertical">Vertical</option>
          </select>
        </label>
        <label class="block space-y-2">
          <span class="text-base font-bold text-slate-950">Rain</span>
          <div class="relative">
            <input id="rainFactor" type="text" inputmode="decimal" value="25" class="hide-number-spin h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 pr-20 text-sm font-medium text-slate-950 outline-none transition focus:border-sky-300 focus:bg-sky-50/30" />
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-sm font-semibold text-slate-950">mm/h</span>
          </div>
        </label>
      </div>
      <div class="flex justify-end">
        <button id="calculateBtn" type="button" class="h-12 w-full rounded-full bg-[#9bd3ff] px-5 text-sm font-black text-[#0d3348] transition hover:bg-[#b8e1ff] disabled:cursor-wait disabled:opacity-75 sm:w-auto xl:min-w-[11.5rem]">
          Calculate link
        </button>
      </div>
    </div>
  </section>

  <div id="errorBox" class="hidden rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700"></div>

  <section id="resultsSection" class="hidden">
    <div class="mb-4 border-b border-slate-200 pb-2">
      <h2 class="text-2xl font-extrabold tracking-tight text-slate-950">Results</h2>
    </div>
    <div id="resultsGrid"></div>
  </section>

  <section>
    <div class="mb-4 border-b border-slate-200 pb-2">
      <h2 class="text-2xl font-extrabold tracking-tight text-slate-950">Profile Chart</h2>
    </div>
    <div id="chartContainer">
      <div class="flex h-64 items-center justify-center rounded-[1.75rem] bg-[#f5f7fb] text-slate-950 text-sm">
        No profile loaded yet.
      </div>
    </div>
  </section>

</div>

<script>
// ============================================================================
// CONFIGURATION
// ============================================================================

const CONFIG = {
  // Replace this URL with your own terrain profile API endpoint.
  // Expects POST { lat1, long1, lat2, long2, samples }
  // Returns  { heights: [{ height: number }, ...] }
  TERRAIN_API_URL: "/rest/terrainProfile",

  MAP_TILE_URL: "https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png",
  MAP_TILE_ATTRIBUTION: "&copy; Kartverket",
  MAP_TILE_MAX_ZOOM: 19,
  MAP_DEFAULT_CENTER: [60.472, 8.4689],
  MAP_DEFAULT_ZOOM: 5,

  EARTH_RADIUS_M: 6_375_000,
  DEGREE_RADIUS_M: 8_500_000,
  SPEED_OF_LIGHT_IN_AIR: 299_705,
  MAX_TERRAIN_SAMPLES: 2000,

  CHART_WIDTH: 1200,
  CHART_HEIGHT: 360,
  CHART_PADDING: { top: 22, right: 12, bottom: 42, left: 56 },

  NAVIGATION_CLICK_GUARD_MS: 220,
  FIT_BOUNDS_MAX_ZOOM: 14,
  FIT_BOUNDS_PADDING: [36, 36]
};

// Point definitions — single source of truth for A/B config
const POINTS = {
  A: { key: "A", tone: "cool", label: "A", fill: "#d8efff", textColor: "#0d3348", markerFill: "#9bd3ff", markerStroke: "#163447" },
  B: { key: "B", tone: "warm", label: "B", fill: "#fde7c7", textColor: "#4b2d13", markerFill: "#f3c48b", markerStroke: "#4a2a12" }
};

const ACTIVE_BTN = "rounded-lg px-3 py-1.5 text-sm font-semibold bg-white text-slate-950 shadow-sm";
const INACTIVE_BTN = "rounded-lg px-3 py-1.5 text-sm font-semibold text-slate-500";
const INPUT_CLASS = "h-12 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm font-medium text-slate-950 outline-none transition placeholder:text-slate-400 focus:border-sky-300 focus:bg-sky-50/30";


// ============================================================================
// STATE
// ============================================================================

const state = {
  points: { A: null, B: null },
  heightScales: { A: "AGL", B: "AGL" },
  nextPoint: "A",
  fitVersion: 0,
  lastAppliedFitVersion: 0,
  analysis: null,
  markers: { A: null, B: null },
  polyline: null,
  lastNavigationAt: 0
};

let map = null;
let clickTimeout = null;


// ============================================================================
// DOM HELPERS
// ============================================================================

function $(id) { return document.getElementById(id); }

function setAttrs(el, attrs) {
  if (typeof el === "string") el = $(el);
  if (!el) return;
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
}

const _fmtCache = {};
function formatNumber(value, digits) {
  const d = digits ?? 2;
  if (!_fmtCache[d]) _fmtCache[d] = new Intl.NumberFormat("en", { minimumFractionDigits: 0, maximumFractionDigits: d });
  return _fmtCache[d].format(value);
}


// ============================================================================
// LOCATIONS UI
// ============================================================================

function buildLocationsUI() {
  const grid = $("locationsGrid");
  grid.innerHTML = Object.values(POINTS).map((p) => `
    <div class="space-y-4">
      <div class="flex items-center gap-3 mb-2">
        <span class="inline-flex h-8 min-w-8 items-center justify-center rounded-full px-3 text-sm font-black" style="background:${p.fill};color:${p.textColor}">${p.label}</span>
        <span class="text-base font-bold text-slate-950">Location ${p.label}</span>
      </div>
      <label class="block space-y-2">
        <span class="text-base font-bold text-slate-950">Coordinate</span>
        <input id="coord${p.key}" type="text" placeholder="Lat, Lng" class="${INPUT_CLASS}" />
      </label>
      <div class="space-y-2">
        <div class="flex items-center justify-between gap-3">
          <span class="text-base font-bold text-slate-950">Antenna Height</span>
          <div class="inline-flex shrink-0 rounded-xl border border-slate-200 bg-slate-50 p-1">
            <button type="button" id="btnAGL_${p.key}" class="${ACTIVE_BTN}">AGL</button>
            <button type="button" id="btnASL_${p.key}" class="${INACTIVE_BTN}">ASL</button>
          </div>
        </div>
        <div class="relative">
          <input id="height${p.key}" type="text" inputmode="decimal" placeholder="Enter height" class="hide-number-spin ${INPUT_CLASS} pr-40" />
          <span id="heightUnit${p.key}" class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-sm font-semibold text-slate-950">meters above ground</span>
        </div>
      </div>
    </div>
  `).join("");

  for (const key of ["A", "B"]) {
    $(`coord${key}`).addEventListener("change", function () {
      const parsed = parseCoordinateInput(this.value);
      if (parsed) { state.points[key] = parsed; syncMarkers(); }
    });
    $(`btnAGL_${key}`).addEventListener("click", () => setHeightScale(key, "AGL"));
    $(`btnASL_${key}`).addEventListener("click", () => setHeightScale(key, "ASL"));
  }
}


// ============================================================================
// HEIGHT SCALE (unified for both points)
// ============================================================================

function setHeightScale(key, scale) {
  state.heightScales[key] = scale;
  $(`btnAGL_${key}`).className = scale === "AGL" ? ACTIVE_BTN : INACTIVE_BTN;
  $(`btnASL_${key}`).className = scale === "ASL" ? ACTIVE_BTN : INACTIVE_BTN;
  $(`heightUnit${key}`).textContent = scale === "AGL" ? "meters above ground" : "meters above sea level";
}


// ============================================================================
// MAP
// ============================================================================

function initMap() {
  map = L.map("map", { zoomControl: true, attributionControl: false, doubleClickZoom: false });
  L.tileLayer(CONFIG.MAP_TILE_URL, { attribution: CONFIG.MAP_TILE_ATTRIBUTION, maxZoom: CONFIG.MAP_TILE_MAX_ZOOM }).addTo(map);
  map.setView(CONFIG.MAP_DEFAULT_CENTER, CONFIG.MAP_DEFAULT_ZOOM);

  const markNav = () => { state.lastNavigationAt = Date.now(); };
  for (const evt of ["dragstart", "movestart", "moveend", "zoomstart", "zoomend"]) map.on(evt, markNav);

  map.on("dblclick", (e) => {
    if (clickTimeout) { clearTimeout(clickTimeout); clickTimeout = null; }
    map.setZoomAround(e.latlng, (map.getZoom() || 5) + 1);
  });

  map.on("click", (e) => {
    if (Date.now() - state.lastNavigationAt < CONFIG.NAVIGATION_CLICK_GUARD_MS) return;
    const point = { lat: Number(e.latlng.lat.toFixed(6)), lng: Number(e.latlng.lng.toFixed(6)) };
    if (clickTimeout) clearTimeout(clickTimeout);
    clickTimeout = setTimeout(() => { clickTimeout = null; handleMapClick(point); }, 250);
  });
}

function createMarkerIcon(pointDef) {
  return L.divIcon({
    className: "",
    html: `<div style="display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:999px;background:${pointDef.markerFill};border:2px solid ${pointDef.markerStroke};box-shadow:0 10px 24px rgba(15,23,42,.18);font:700 12px/1 Manrope,sans-serif;color:${pointDef.markerStroke};">${pointDef.label}</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17]
  });
}

function syncMarker(key) {
  const point = state.points[key];
  const pointDef = POINTS[key];

  if (point) {
    if (!state.markers[key]) {
      state.markers[key] = L.marker([point.lat, point.lng], {
        icon: createMarkerIcon(pointDef), draggable: true, autoPan: true
      }).addTo(map);
      state.markers[key].on("dragend", () => {
        const pos = state.markers[key].getLatLng();
        state.points[key] = { lat: Number(pos.lat.toFixed(6)), lng: Number(pos.lng.toFixed(6)) };
        $(`coord${key}`).value = `${state.points[key].lat}, ${state.points[key].lng}`;
        syncMarkers();
      });
    } else {
      state.markers[key].setLatLng([point.lat, point.lng]);
    }
  } else if (state.markers[key]) {
    state.markers[key].remove();
    state.markers[key] = null;
  }
}

function syncPolyline() {
  if (state.polyline) { state.polyline.remove(); state.polyline = null; }
  const a = state.points.A, b = state.points.B;
  if (a && b) {
    state.polyline = L.polyline([[a.lat, a.lng], [b.lat, b.lng]], { color: "#0f4c81", weight: 3, opacity: 0.9 }).addTo(map);
  }
}

function syncMarkers() {
  syncMarker("A");
  syncMarker("B");
  syncPolyline();

  const a = state.points.A, b = state.points.B;
  if (a && b) {
    if (state.fitVersion > 0 && state.fitVersion !== state.lastAppliedFitVersion) {
      map.fitBounds(state.polyline.getBounds(), { padding: CONFIG.FIT_BOUNDS_PADDING, maxZoom: CONFIG.FIT_BOUNDS_MAX_ZOOM, animate: false });
      state.lastAppliedFitVersion = state.fitVersion;
    }
  } else if (a || b) {
    map.panTo([(a || b).lat, (a || b).lng], { animate: false });
  } else {
    map.setView(CONFIG.MAP_DEFAULT_CENTER, CONFIG.MAP_DEFAULT_ZOOM, { animate: false });
  }
}

function handleMapClick(point) {
  const key = state.nextPoint;
  state.points[key] = point;
  $(`coord${key}`).value = `${point.lat}, ${point.lng}`;
  state.nextPoint = key === "A" ? "B" : "A";
  updateMapHint();
  syncMarkers();
}

function updateMapHint() {
  const hint = $("map-hint");
  hint.textContent = (state.points.A && state.points.B)
    ? `Click to move point ${state.nextPoint}, or drag A/B`
    : `Next click sets point ${state.nextPoint}`;
}


// ============================================================================
// COORDINATE PARSING
// ============================================================================

function parseCoordinateInput(input) {
  const cleaned = input.trim().replace(/[()]/g, " ");
  if (!cleaned) return null;
  const parts = cleaned.match(/-?\d+(?:[.,]\d+)?/g);
  if (!parts || parts.length !== 2) return null;
  const lat = toFiniteNumber(parts[0]);
  const lng = toFiniteNumber(parts[1]);
  if (lat === null || lng === null) return null;
  if (Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;
  return { lat, lng };
}

function toFiniteNumber(value) {
  const parsed = Number(value.trim().replace(",", "."));
  return Number.isFinite(parsed) ? parsed : null;
}


// ============================================================================
// TERRAIN PROFILE API
// ============================================================================

async function fetchTerrainProfile(pointA, pointB, distance) {
  const samples = Math.min(distance < 8000 ? Math.ceil(distance / 10) : Math.ceil(distance / 25), CONFIG.MAX_TERRAIN_SAMPLES);
  const response = await fetch(CONFIG.TERRAIN_API_URL, {
    method: "POST",
    headers: { accept: "application/json", "content-type": "application/json" },
    cache: "no-store",
    body: JSON.stringify({ long1: pointA.lng, lat1: pointA.lat, long2: pointB.lng, lat2: pointB.lat, samples })
  });
  if (!response.ok) throw new Error("Could not fetch terrain profile.");
  const data = await response.json();
  const heights = data.heights
    ?.map((e) => (typeof e.height === "number" && Number.isFinite(e.height)) ? Math.max(0, e.height) : undefined)
    .filter((v) => v !== undefined);
  if (!heights?.length) throw new Error("Terrain profile has no elevation data.");
  return heights;
}


// ============================================================================
// CALCULATION ENGINE
// ============================================================================

const degToRad = (d) => (d * Math.PI) / 180;
const radToDeg = (r) => (r * 180) / Math.PI;
const haverSine = (v) => Math.sin(v / 2) ** 2;
const clampCosine = (v) => Math.min(1, Math.max(-1, v));
const clampFresnelFactor = (v) => Math.min(3, Math.max(0.6, v));

function calculateDistance(lat1, lng1, lat2, lng2) {
  const latR1 = degToRad(lat1), latR2 = degToRad(lat2);
  const h = haverSine(degToRad(lat2 - lat1)) + Math.cos(latR1) * Math.cos(latR2) * haverSine(degToRad(lng2 - lng1));
  return 2 * CONFIG.EARTH_RADIUS_M * Math.asin(Math.sqrt(h));
}

function heightCorrectDistance(h1, h2, dist) {
  return Math.sqrt(Math.abs(h1 - h2) ** 2 + dist ** 2);
}

function getKFactorValue(key) {
  const kFactors = { "1": 1, "2/3": 2 / 3, "-2/3": -2 / 3 };
  return kFactors[key] ?? 4 / 3;
}

function getEarthCurve(radiusValue, n, distance) {
  const rKm = radiusValue / 1000, dKm = distance / 1000;
  const dRads = (dKm / (rKm * Math.PI * 2)) * Math.PI * 2;
  const perPt = dRads / n, base = Math.cos(dRads / 2) * rKm, off = Math.PI * 2 + dRads / 2;
  const result = [];
  for (let i = 0; i < n; i++) result[i] = (Math.cos(off - perPt * i) * rKm - base) * 1000;
  return result;
}

function createLineOfSightList(h1, h2, n) {
  const values = [];
  const diff = h1 - h2;
  let step = diff / (n - 1), mod = 1;
  if (step < 0) { mod = -1; step *= -1; }
  for (let i = 0; i < n; i++) values[i] = h1 - step * i * mod;
  values[n - 1] = h2;
  return values;
}

function fresnelZone(distance, waveLength, n, factor) {
  const result = [0];
  let d1 = 0, d2 = distance;
  const step = distance / (n - 1);
  for (let i = 1; i < n - 1; i++) {
    d1 += step; d2 -= step;
    result[i] = Math.sqrt((waveLength * d1 * d2) / (d1 + d2)) * factor;
  }
  result[n - 1] = 0;
  return result;
}

function getMinimumClearance(ref, terrain) {
  let min = Infinity;
  for (let i = 0; i < ref.length; i++) { const c = ref[i] - terrain[i]; if (c < min) min = c; }
  return min;
}

function getAzimuth(latA, lonA, latB, lonB) {
  let corrA = 0, corrB = 0;
  if (latA < latB) corrB = 540; else if (latA > latB) corrA = 540;
  const lonRA = degToRad(lonA), lonRB = degToRad(lonB), latRA = degToRad(latA), latRB = degToRad(latB);
  const ld = lonRB - lonRA, ldr = lonRA - lonRB;
  const a1 = Math.atan(Math.sin(ld) / (Math.cos(latRA) * Math.tan(latRB) - Math.sin(latRA) * Math.cos(ld)));
  const a2 = Math.atan(Math.sin(ldr) / (Math.cos(latRB) * Math.tan(latRA) - Math.sin(latRB) * Math.cos(ldr)));
  return [normalizeAngle(radToDeg(a1) + corrA), normalizeAngle(radToDeg(a2) + corrB)];
}

function normalizeAngle(v) {
  let n = v;
  while (n < 0 || n > 360) { if (n < 0) n += 360; else n -= 360; }
  return n;
}

function calculateElevationAngles(hStart, hEnd, distance, radius) {
  const s = hStart + radius, e = hEnd + radius;
  const acosA = clampCosine((s ** 2 + distance ** 2 - e ** 2) / (2 * s * distance));
  const acosB = clampCosine((e ** 2 + distance ** 2 - s ** 2) / (2 * e * distance));
  return [radToDeg(Math.acos(acosA)) - 90, radToDeg(Math.acos(acosB)) - 90];
}


// ============================================================================
// RAIN ATTENUATION (ITU MODEL)
// ============================================================================

const ITU_RAIN_PARAMS = [
  [1,0.0000259,0.9691,0.0000308,0.8592],[1.5,0.0000443,1.0185,0.0000574,0.8957],
  [2,0.0000847,1.0664,0.0000998,0.949],[2.5,0.0001321,1.1209,0.0001464,1.0085],
  [3,0.000139,1.2322,0.0001942,1.0688],[3.5,0.0001155,1.4189,0.0002346,1.1387],
  [4,0.0001071,1.6009,0.0002461,1.2476],[4.5,0.000134,1.6948,0.0002347,1.3987],
  [5,0.0002162,1.6969,0.0002428,1.5317],[5.5,0.0003909,1.6499,0.0003115,1.5882],
  [6,0.0007056,1.59,0.0004878,1.5728],[7,0.001915,1.481,0.001425,1.4745],
  [8,0.004115,1.3905,0.00345,1.3797],[9,0.007535,1.3155,0.006691,1.2895],
  [10,0.01217,1.2571,0.01129,1.2156],[11,0.01772,1.214,0.01731,1.1617],
  [12,0.02386,1.1825,0.02455,1.1216],[13,0.03041,1.1586,0.03266,1.0901],
  [14,0.03738,1.1396,0.04126,1.0646],[15,0.04481,1.1233,0.05008,1.044],
  [16,0.05282,1.1086,0.05895,1.0273],[17,0.06098,1.0949,0.06797,1.0132],
  [18,0.06903,1.0818,0.07665,1.001],[19,0.07687,1.0691,0.08489,0.9901],
  [20,0.0845,1.0568,0.0925,0.9802],[21,0.09191,1.0447,0.09998,0.971],
  [22,0.09934,1.0329,0.10742,0.9625],[23,0.10705,1.0209,0.11514,0.9548],
  [24,0.11506,1.0087,0.12323,0.9476],[25,0.12335,0.9965,0.13164,0.9408],
  [26,0.13192,0.9844,0.14029,0.9344],[27,0.14073,0.9724,0.14918,0.9283],
  [28,0.14976,0.9605,0.15824,0.9225],[29,0.15898,0.9489,0.16745,0.917],
  [30,0.16836,0.9376,0.17681,0.9117],[35,0.21601,0.8895,0.22383,0.8905],
  [40,0.26914,0.8485,0.27605,0.8689],[45,0.32543,0.8155,0.33134,0.8484],
  [50,0.38385,0.7884,0.38904,0.8295],[55,0.44245,0.7669,0.44711,0.8124],
  [60,0.5008,0.7502,0.50517,0.7971],[70,0.61522,0.7263,0.61971,0.7708],
  [80,0.72354,0.7105,0.72735,0.7491],[90,0.82683,0.6998,0.82942,0.7305],
  [100,0.92563,0.6925,0.92667,0.7146]
];

function interpolateItuFactors(freq) {
  const p = ITU_RAIN_PARAMS;
  for (let i = 0; i < p.length; i++) {
    if (p[i][0] > freq) {
      if (i === 0) return p[0];
      const f1 = p[i][0], f2 = p[i - 1][0], mid = f1 - freq, diff = f1 - f2;
      const w1 = (diff - mid) / diff, w2 = mid / diff;
      return [freq, p[i][1]*w1+p[i-1][1]*w2, p[i][2]*w1+p[i-1][2]*w2, p[i][3]*w1+p[i-1][3]*w2, p[i][4]*w1+p[i-1][4]*w2];
    }
  }
  return p[p.length - 1];
}

function getRainAttenuation(distKm, freqGHz, horizontal, rainRate) {
  const f = interpolateItuFactors(freqGHz);
  const kIdx = horizontal ? 1 : 3, aIdx = horizontal ? 2 : 4;
  const dbPerKm = f[kIdx] * rainRate ** f[aIdx];
  let r = 1 / (0.477 * distKm ** 0.633 * rainRate ** (0.073 * f[aIdx]) * freqGHz ** 0.123 - 10.579 * (1 - Math.exp(-0.024 * distKm)));
  if (r > 2.5) r = 2.5;
  return dbPerKm * r * distKm;
}


// ============================================================================
// MAIN ANALYSIS
// ============================================================================

function validateEndpoint(ep, label) {
  const point = parseCoordinateInput(ep.coordinate);
  if (!point) throw new Error(`Coordinates for ${label} must be in format Lat, Lng.`);
  if (typeof ep.antennaHeight !== "number" || !Number.isFinite(ep.antennaHeight) || ep.antennaHeight < 0)
    throw new Error(`Antenna height for ${label} must be 0 or greater.`);
  return point;
}

async function runRadioLinkAnalysis(fd) {
  const pA = validateEndpoint(fd.endpointA, "A");
  const pB = validateEndpoint(fd.endpointB, "B");
  if (!Number.isFinite(fd.frequencyMHz) || fd.frequencyMHz <= 0) throw new Error("Frequency must be greater than 0 MHz.");
  if (!Number.isFinite(fd.rainFactor) || fd.rainFactor < 0) throw new Error("Rain factor must be 0 or greater.");

  const terrainDist = calculateDistance(pA.lat, pA.lng, pB.lat, pB.lng);
  if (!Number.isFinite(terrainDist) || terrainDist <= 0) throw new Error("Points must be different to calculate a link.");

  const heights = await fetchTerrainProfile(pA, pB, terrainDist);
  if (heights.length < 2) throw new Error("Terrain profile returned too few points.");

  const startAlt = fd.endpointA.heightScale === "AGL" ? heights[0] + fd.endpointA.antennaHeight : fd.endpointA.antennaHeight;
  const endAlt = fd.endpointB.heightScale === "AGL" ? heights[heights.length - 1] + fd.endpointB.antennaHeight : fd.endpointB.antennaHeight;
  const linkDist = heightCorrectDistance(startAlt, endAlt, terrainDist);
  const az = getAzimuth(pA.lat, pA.lng, pB.lat, pB.lng);
  const kRadius = CONFIG.EARTH_RADIUS_M * getKFactorValue(fd.kFactor);
  const earthCurve = getEarthCurve(kRadius, heights.length, terrainDist);
  const terrain = heights.map((h, i) => h + earthCurve[i]);
  const los = createLineOfSightList(startAlt, endAlt, heights.length);
  const wl = CONFIG.SPEED_OF_LIGHT_IN_AIR / (fd.frequencyMHz * 1000);
  const ff = clampFresnelFactor(fd.fresnelFactor);
  const fz = fresnelZone(terrainDist, wl, heights.length, ff);
  const fLower = los.map((h, i) => h - fz[i]);
  const fUpper = los.map((h, i) => h + fz[i]);
  const elev = calculateElevationAngles(startAlt, endAlt, linkDist, CONFIG.DEGREE_RADIUS_M);
  const rain = getRainAttenuation(linkDist / 1000, fd.frequencyMHz, fd.polarization === "horizontal", fd.rainFactor);
  const freeSpace = 20 * (Math.log((4 * Math.PI * terrainDist) / wl) / Math.LN10);

  return {
    pointA: pA, pointB: pB, frequencyMHz: fd.frequencyMHz, kFactor: fd.kFactor,
    fresnelFactor: ff, polarization: fd.polarization, rainFactor: fd.rainFactor,
    terrainDistanceKm: terrainDist / 1000, linkDistanceKm: linkDist / 1000,
    freeSpaceLossDb: freeSpace, rainAttenuationDb: Math.abs(rain),
    azimuthA: az[0], azimuthB: az[1], elevationA: elev[0], elevationB: elev[1],
    startAltitudeM: startAlt, endAltitudeM: endAlt,
    lineClearanceM: getMinimumClearance(los, terrain),
    fresnelClearanceM: getMinimumClearance(fLower, terrain),
    distanceTicksKm: [0, 0.25, 0.5, 0.75, 1].map((s) => Number((terrainDist / 1000 * s).toFixed(2))),
    series: { terrain, earthCurve, lineOfSight: los, fresnelLower: fLower, fresnelUpper: fUpper }
  };
}


// ============================================================================
// PROFILE CHART
// ============================================================================

function downsampleSeries(analysis) {
  const raw = analysis.series;
  const step = Math.max(1, Math.ceil(raw.terrain.length / 260));
  const idx = raw.terrain.map((_, i) => i).filter((_, i) => i % step === 0 || i === raw.terrain.length - 1);
  return {
    indexes: idx,
    earthCurve: idx.map((i) => raw.earthCurve[i]),
    terrain: idx.map((i) => raw.terrain[i] - raw.earthCurve[i]),
    lineOfSight: idx.map((i) => raw.lineOfSight[i]),
    fresnelLower: idx.map((i) => raw.fresnelLower[i]),
    fresnelUpper: idx.map((i) => raw.fresnelUpper[i]),
    distancesKm: idx.map((i) => Number(((analysis.terrainDistanceKm * i) / Math.max(raw.terrain.length - 1, 1)).toFixed(2)))
  };
}

function computeChartScales(data) {
  const W = CONFIG.CHART_WIDTH, H = CONFIG.CHART_HEIGHT, P = CONFIG.CHART_PADDING;
  let minV = Infinity, maxV = -Infinity;
  for (const series of [data.terrain, data.lineOfSight, data.fresnelLower, data.fresnelUpper, data.earthCurve]) {
    for (const v of series) { if (v < minV) minV = v; if (v > maxV) maxV = v; }
  }
  const range = maxV - minV || 1;
  const chartMin = minV >= 0 ? 0 : minV - range * 0.08;
  const chartMax = maxV + range * 0.1, chartRange = chartMax - chartMin || 1;
  const n = data.indexes.length;
  return {
    W, H, P, chartMin, chartRange,
    toX: (i) => P.left + (i / Math.max(n - 1, 1)) * (W - P.left - P.right),
    toY: (v) => H - P.bottom - ((v - chartMin) / chartRange) * (H - P.top - P.bottom)
  };
}

function buildSvgContent(analysis, data, scales) {
  const { W, H, P, chartMin, chartRange, toX, toY } = scales;
  const buildLine = (vals) => vals.map((v, i) => `${i === 0 ? "M" : "L"} ${toX(i).toFixed(2)} ${toY(v).toFixed(2)}`).join(" ");
  const terrainArea = buildLine(data.terrain) + ` L ${toX(data.terrain.length - 1).toFixed(2)} ${(H - P.bottom).toFixed(2)} L ${toX(0).toFixed(2)} ${(H - P.bottom).toFixed(2)} Z`;

  let grid = "", xLines = "", distLabels = "";
  for (let s = 0; s <= 4; s++) {
    const val = chartMin + (chartRange * s) / 4, y = toY(val);
    grid += `<line x1="${P.left}" x2="${W-P.right}" y1="${y}" y2="${y}" stroke="#dbe3ef" stroke-dasharray="4 6"/>`;
    grid += `<text x="${P.left-8}" y="${y-6}" font-size="13" fill="#7c8aa0" text-anchor="end">${formatNumber(val,0)} m</text>`;
    const x = P.left + ((W-P.left-P.right)*s)/4;
    xLines += `<line x1="${x}" x2="${x}" y1="${P.top}" y2="${H-P.bottom}" stroke="#eef2f8"/>`;
  }
  analysis.distanceTicksKm.forEach((t, i) => {
    const x = P.left + (i / (analysis.distanceTicksKm.length - 1)) * (W - P.left - P.right);
    const anchor = i === 0 ? "start" : i === analysis.distanceTicksKm.length - 1 ? "end" : "middle";
    distLabels += `<text x="${x}" y="${H-6}" font-size="13" font-weight="600" fill="#7c8aa0" text-anchor="${anchor}" letter-spacing="0.12em">${formatNumber(t,2)} KM</text>`;
  });

  return `
    <svg viewBox="0 0 ${W} ${H}" class="block h-auto w-full cursor-crosshair" role="img" aria-label="Terrain Profile" id="profileSvg">
      ${grid}${xLines}
      <defs><linearGradient id="terrainFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6c7f5c" stop-opacity="0.42"/><stop offset="100%" stop-color="#b8c6ab" stop-opacity="0.1"/></linearGradient></defs>
      <path d="${terrainArea}" fill="url(#terrainFill)"/>
      <path d="${buildLine(data.terrain)}" fill="none" stroke="#2f3d2a" stroke-width="2.6"/>
      <path d="${buildLine(data.earthCurve)}" fill="none" stroke="#4baee8" stroke-width="2"/>
      <path d="${buildLine(data.fresnelUpper)}" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5 7"/>
      <path d="${buildLine(data.fresnelLower)}" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5 7"/>
      <path d="${buildLine(data.lineOfSight)}" fill="none" stroke="#0f766e" stroke-width="2.2"/>
      <circle cx="${toX(0)}" cy="${toY(data.lineOfSight[0])}" r="5.5" fill="#8bd1ff" stroke="#fff" stroke-width="2"/>
      <circle cx="${toX(data.indexes.length-1)}" cy="${toY(data.lineOfSight[data.lineOfSight.length-1])}" r="5.5" fill="#f0bb7d" stroke="#fff" stroke-width="2"/>
      <line id="hoverLine" x1="0" x2="0" y1="${P.top}" y2="${H-P.bottom}" stroke="#94a3b8" stroke-dasharray="4 6" opacity="0"/>
      <circle id="hoverTerrain" cx="0" cy="0" r="4.5" fill="#2f3d2a" stroke="#fff" stroke-width="2" opacity="0"/>
      <circle id="hoverLOS" cx="0" cy="0" r="4" fill="#0f766e" stroke="#fff" stroke-width="2" opacity="0"/>
      <rect id="tooltipBg" x="0" y="0" width="200" height="126" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1.2" opacity="0"/>
      <text id="ttDist" x="0" y="0" font-size="14" font-weight="700" fill="#0f172a" opacity="0"></text>
      <text id="ttTerrain" x="0" y="0" font-size="13" fill="#334155" opacity="0"></text>
      <text id="ttEarth" x="0" y="0" font-size="13" fill="#4baee8" opacity="0"></text>
      <text id="ttLOS" x="0" y="0" font-size="13" fill="#0f766e" opacity="0"></text>
      <text id="ttFL" x="0" y="0" font-size="13" fill="#f59e0b" opacity="0"></text>
      <text id="ttFU" x="0" y="0" font-size="13" fill="#d97706" opacity="0"></text>
      ${distLabels}
    </svg>
    <div class="flex flex-wrap gap-3 mt-5 text-xs font-semibold uppercase tracking-[0.16em] text-slate-950">
      <span class="flex items-center gap-2"><span class="h-3.5 w-3.5 rounded-full bg-[#2e3b29]"></span>Terrain</span>
      <span class="flex items-center gap-2"><span class="h-3.5 w-3.5 rounded-full bg-[#4baee8]"></span>Earth Curve</span>
      <span class="flex items-center gap-2"><span class="h-3.5 w-3.5 rounded-full bg-[#0f766e]"></span>Line of Sight</span>
      <span class="flex items-center gap-2"><span class="h-3.5 w-3.5 rounded-full bg-[#f59e0b]"></span>Fresnel</span>
    </div>`;
}

function attachChartHover(data, scales) {
  const svg = $("profileSvg");
  if (!svg) return;
  const { W, P, toX, toY } = scales;
  const maxIdx = data.indexes.length - 1;
  const chartW = W - P.left - P.right;

  const els = {
    line: $("hoverLine"), terrain: $("hoverTerrain"), los: $("hoverLOS"), bg: $("tooltipBg"),
    ttDist: $("ttDist"), ttTerrain: $("ttTerrain"), ttEarth: $("ttEarth"),
    ttLOS: $("ttLOS"), ttFL: $("ttFL"), ttFU: $("ttFU")
  };
  const allEls = Object.values(els);

  const tooltipRows = [
    { el: els.ttDist, off: 20, fmt: (i) => `Distance ${formatNumber(data.distancesKm[i], 2)} km` },
    { el: els.ttTerrain, off: 40, fmt: (i) => `Terrain ${formatNumber(data.terrain[i], 1)} m` },
    { el: els.ttEarth, off: 58, fmt: (i) => `Earth Curve ${formatNumber(data.earthCurve[i], 2)} m` },
    { el: els.ttLOS, off: 76, fmt: (i) => `Line of Sight ${formatNumber(data.lineOfSight[i], 1)} m` },
    { el: els.ttFL, off: 94, fmt: (i) => `Fresnel lower ${formatNumber(data.fresnelLower[i], 1)} m` },
    { el: els.ttFU, off: 112, fmt: (i) => `Fresnel upper ${formatNumber(data.fresnelUpper[i], 1)} m` }
  ];

  svg.addEventListener("pointermove", (e) => {
    const bounds = svg.getBoundingClientRect();
    const relX = ((e.clientX - bounds.left) / bounds.width) * W;
    const ratio = chartW <= 0 ? 0 : (Math.min(W - P.right, Math.max(P.left, relX)) - P.left) / chartW;
    const idx = Math.max(0, Math.min(maxIdx, Math.round(ratio * maxIdx)));
    const hx = toX(idx), hTY = toY(data.terrain[idx]), hLY = toY(data.lineOfSight[idx]);
    const ttX = Math.min(Math.max(hx + 12, 16), W - 208), ttY = Math.max(18, Math.min(hTY - 132, CONFIG.CHART_HEIGHT - 164));

    setAttrs(els.line, { x1: hx, x2: hx, opacity: 1 });
    setAttrs(els.terrain, { cx: hx, cy: hTY, opacity: 1 });
    setAttrs(els.los, { cx: hx, cy: hLY, opacity: 1 });
    setAttrs(els.bg, { x: ttX, y: ttY, opacity: 1 });
    for (const row of tooltipRows) {
      row.el.setAttribute("x", ttX + 12);
      row.el.setAttribute("y", ttY + row.off);
      row.el.setAttribute("opacity", "1");
      row.el.textContent = row.fmt(idx);
    }
  });

  svg.addEventListener("pointerleave", () => {
    for (const el of allEls) el.setAttribute("opacity", "0");
  });
}

function renderProfileChart(analysis) {
  const container = $("chartContainer");
  if (!analysis) {
    container.innerHTML = '<div class="flex h-64 items-center justify-center rounded-[1.75rem] bg-[#f5f7fb] text-slate-950 text-sm">No profile loaded yet.</div>';
    return;
  }
  const data = downsampleSeries(analysis);
  const scales = computeChartScales(data);
  container.innerHTML = buildSvgContent(analysis, data, scales);
  attachChartHover(data, scales);
}


// ============================================================================
// RESULTS
// ============================================================================

function renderResults(analysis) {
  const section = $("resultsSection"), grid = $("resultsGrid");
  if (!analysis) { section.classList.add("hidden"); return; }
  section.classList.remove("hidden");

  const clearanceTone = (v) => v >= 0 ? "text-emerald-600" : "text-rose-600";
  const clearanceSign = (v) => (v >= 0 ? "+" : "") + formatNumber(v, 1);
  const rows = [
    { label: "LOS Clearance", value: `${clearanceSign(analysis.lineClearanceM)} m`, cls: clearanceTone(analysis.lineClearanceM) },
    { label: "Rain Attenuation", value: `${formatNumber(analysis.rainAttenuationDb, 2)} dB` },
    { label: "Azimuth A/B", value: `${formatNumber(analysis.azimuthA, 1)}\u00B0 / ${formatNumber(analysis.azimuthB, 1)}\u00B0` },
    { label: "Terrain Distance", value: `${formatNumber(analysis.terrainDistanceKm, 2)} km` },
    { label: "Link Distance", value: `${formatNumber(analysis.linkDistanceKm, 2)} km` },
    { label: "Free Space Loss", value: `${formatNumber(analysis.freeSpaceLossDb, 2)} dB` },
    { label: "Elevation A/B", value: `${formatNumber(analysis.elevationA, 2)}\u00B0 / ${formatNumber(analysis.elevationB, 2)}\u00B0` },
    { label: "Fresnel Clearance", value: `${clearanceSign(analysis.fresnelClearanceM)} m`, cls: clearanceTone(analysis.fresnelClearanceM) },
    { label: "Point A Altitude", value: `${formatNumber(analysis.startAltitudeM, 0)} m a.s.l.` },
    { label: "Point B Altitude", value: `${formatNumber(analysis.endAltitudeM, 0)} m a.s.l.` }
  ];
  grid.innerHTML = rows.map((r) => `
    <div class="grid gap-1 border-t border-slate-200/80 py-4 first:border-t-0 first:pt-0 sm:grid-cols-[minmax(0,1fr)_8.5rem] sm:items-center sm:gap-4">
      <span class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-950">${r.label}</span>
      <span class="text-[0.935rem] leading-6 font-semibold tabular-nums ${r.cls || "text-slate-950"} sm:text-right">${r.value}</span>
    </div>`).join("");
}


// ============================================================================
// CALCULATE HANDLER
// ============================================================================

async function handleCalculate() {
  const btn = $("calculateBtn"), errorBox = $("errorBox");
  btn.disabled = true; btn.textContent = "Calculating..."; errorBox.classList.add("hidden");

  try {
    const numVal = (id, fallback) => parseFloat($(id).value.replace(",", ".")) || fallback;
    const fd = {
      endpointA: { coordinate: $("coordA").value, antennaHeight: numVal("heightA", 0), heightScale: state.heightScales.A },
      endpointB: { coordinate: $("coordB").value, antennaHeight: numVal("heightB", 0), heightScale: state.heightScales.B },
      frequencyMHz: numVal("frequencyMHz", 450),
      fresnelFactor: numVal("fresnelFactor", 0.6),
      kFactor: $("kFactor").value,
      polarization: $("polarization").value,
      rainFactor: numVal("rainFactor", 25)
    };
    const analysis = await runRadioLinkAnalysis(fd);
    state.analysis = analysis;
    state.points.A = analysis.pointA;
    state.points.B = analysis.pointB;
    state.fitVersion++;
    syncMarkers();
    renderResults(analysis);
    renderProfileChart(analysis);
  } catch (err) {
    errorBox.textContent = err.message || "Could not calculate the link.";
    errorBox.classList.remove("hidden");
    renderResults(null);
    renderProfileChart(null);
  } finally {
    btn.disabled = false; btn.textContent = "Calculate link";
  }
}


// ============================================================================
// INIT
// ============================================================================

document.addEventListener("DOMContentLoaded", () => {
  buildLocationsUI();
  initMap();
  $("fresnelFactor").addEventListener("input", function () {
    $("fresnelDisplay").textContent = parseFloat(this.value).toFixed(1);
  });
  $("calculateBtn").addEventListener("click", handleCalculate);
});
