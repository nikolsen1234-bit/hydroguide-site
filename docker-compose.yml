services:
  hydroguide:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - hydroguide-data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/hydroguide.db
      - DEBUG=false
    restart: unless-stopped

volumes:
  hydroguide-data:
    driver: local
